name: ci

on:
  push:
    branches:
    - master
    tags:
      - '*'
  pull_request:
    branches:
    - '*'
  schedule:
    - cron: '0 0 * * 1'  # weekly
  workflow_dispatch:
jobs:
  test:
    name: "test py${{ matrix.python-version }} ${{ matrix.subdivision }}${{ matrix.scope && format(' {0}', matrix.scope) || '' }} pandas${{ matrix.pandas-version }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        subdivision:
          - "test_legacy"
          - "test_auxlib"
        scope:
          - "polars"
          - "non-polars"
        pandas-version: ["==3.*"]
        exclude:
          - python-version: "3.10"
            pandas-version: "==3.*"
          - subdivision: "test_auxlib"
            scope: "polars"
          - subdivision: "test_auxlib"
            scope: "non-polars"
        include:
          - python-version: "3.12"
            subdivision: "test_legacy"
            scope: "polars"
            pandas-version: "==2.3.3"
          - python-version: "3.12"
            subdivision: "test_legacy"
            scope: "non-polars"
            pandas-version: "==2.3.3"
          - subdivision: "test_auxlib"
            scope: ""
            pandas-version: "==3.*"
          - python-version: "3.12"
            subdivision: "test_auxlib"
            scope: ""
            pandas-version: "==2.3.3"

    steps:
    - uses: actions/checkout@v1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install tox tox-gh-actions
    - name: Test with tox
      run: |
        export PHYLOFRAME_TESTS_SUBDIVISION=${{ matrix.subdivision }}
        if [ "${{ matrix.subdivision }}" = "test_legacy" ] && [ "${{ matrix.scope }}" = "polars" ]; then
          tox --force-dep "pandas${{ matrix.pandas-version }}" -- -k polars
        elif [ "${{ matrix.subdivision }}" = "test_legacy" ] && [ "${{ matrix.scope }}" = "non-polars" ]; then
          tox --force-dep "pandas${{ matrix.pandas-version }}" -- -k "not polars"
        else
          tox --force-dep "pandas${{ matrix.pandas-version }}"
        fi

  test-heavy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        subdivision:
          - "test_legacy"
          - "test_auxlib"

    steps:
    - uses: actions/checkout@v1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install tox tox-gh-actions
    - name: Run heavy tests with tox
      run: |
        export PHYLOFRAME_TESTS_SUBDIVISION=${{ matrix.subdivision }}
        tox -- -m heavy

  cli-smoke:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install Python dependencies
      uses: py-actions/py-dependency-install@v4
      with:
        path: "requirements-dev/requirements-testing.txt"
    - name: Run examples
      run: |
        python3 -m phyloframe
        python3 -m phyloframe.legacy._alifestd_as_newick_asexual --help
        python3 -m phyloframe.legacy._alifestd_downsample_tips_asexual --help
        python3 -m phyloframe.legacy._alifestd_try_add_ancestor_list_col --help

  coverage:
    name: "coverage ${{ matrix.subdivision }}${{ matrix.scope && format(' {0}', matrix.scope) || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        subdivision:
          - "test_legacy"
          - "test_auxlib"
        scope:
          - "polars"
          - "non-polars"
        exclude:
          - subdivision: "test_auxlib"
            scope: "polars"
          - subdivision: "test_auxlib"
            scope: "non-polars"
        include:
          - subdivision: "test_auxlib"
            scope: ""
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.12
      uses: actions/setup-python@v2
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        python -m pip install -r requirements-dev/py312/requirements-testing.txt
    - name: Log coverage configuration
      run: coverage debug sys
    - name: Run tests with coverage report
      run: |
        if [ "${{ matrix.subdivision }}" = "test_legacy" ] && [ "${{ matrix.scope }}" = "polars" ]; then
          coverage run -m pytest tests/test_phyloframe/${{ matrix.subdivision }} -k polars
        elif [ "${{ matrix.subdivision }}" = "test_legacy" ] && [ "${{ matrix.scope }}" = "non-polars" ]; then
          coverage run -m pytest tests/test_phyloframe/${{ matrix.subdivision }} -k "not polars"
        else
          coverage run -m pytest tests/test_phyloframe/${{ matrix.subdivision }}
        fi
    - uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: tests
        fail_ci_if_error: true
        verbose: true

  tidy:
    runs-on: ubuntu-24.04
    steps:
    - name: Install apt dependencies
      run: sudo apt-get install -y rename
    - uses: actions/checkout@v1
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        python -m pip install -r requirements-dev/requirements-testing.txt
    - uses: editorconfig-checker/action-editorconfig-checker@main
    - name: Test editorconfig tidyness
      run: editorconfig-checker
    - name: Test tidy/ tidyness
      run: ./tidy/test_tidy.sh

  packaging-bdist:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build bdist
        run: |
          python3 -m venv env
          source env/bin/activate
          python3 -m pip install -r requirements-dev/requirements-release.txt
          python3 setup.py bdist_wheel
          tree dist
          deactivate
      - name: Upgrade pip
        run: python3 -m pip install pip --upgrade
      - name: Install from bdist
        run: python3 -m pip install dist/*.whl
      - name: Test install
        run: |
          find . -type f -name '*.py' -exec rm {} \;
          find . -type f -name '*.pyi' -exec rm {} \;
          python3 -c "import phyloframe; print(phyloframe.__version__)"

  packaging-sdist:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build sdist
        run: |
          python3 -m venv env
          source env/bin/activate
          python3 -m pip install -r requirements-dev/requirements-release.txt
          python3 setup.py sdist
          tree dist
          deactivate
      - name: Upgrade pip
        run: python3 -m pip install pip --upgrade
      - name: Install from sdist
        run: python3 -m pip install dist/*.tar.gz
      - name: Test install
        run: |
          find . -type f -name '*.py' -exec rm {} \;
          find . -type f -name '*.pyi' -exec rm {} \;
          python3 -c "import phyloframe; print(phyloframe.__version__)"

  packaging-source:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Upgrade pip
        run: python3 -m pip install pip --upgrade
      - name: Install from source
        run: python3 -m pip install .
      - name: Test install
        run: |
          rm -rf *
          cd
          python3 -c "import phyloframe; print(phyloframe.__version__)"

  deploy-ghcr:
    name: Docker Image Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set Tags
        id: set_tags
        run: |
          if [[ "${GITHUB_REF_NAME}" != *merge ]]; then
            echo "TAGS=ghcr.io/mmore500/phyloframe:latest,ghcr.io/mmore500/phyloframe:${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "TAGS=ghcr.io/mmore500/phyloframe:latest" >> $GITHUB_ENV
          fi
      - name: Build and Push to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ env.TAGS }}

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  paper:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          # This should be the path to the paper within your repo.
          paper-path: joss/paper.md
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          # This is the output path where Pandoc will write the compiled
          # PDF. Note, this should be the same directory as the input
          # paper.md
          path: joss/paper.pdf

  benchmark:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Python 3.12
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"
      - name: Install phyloframe
        run: python3 -m pip install ".[jit]"
      - name: Install benchmark dependencies
        run: |
          sudo apt-get install -y swig
          python3 -m pip install \
            biopython==1.86 \
            dendropy==5.0.8 \
            treeswift==1.1.45 \
            ete3==3.1.3 \
            scikit-bio==0.6.3
          python3 -m pip download CompactTree==1.0.0 --no-binary :all: -d /tmp/ct
          cd /tmp && tar xzf ct/compacttree-1.0.0.tar.gz
          sed -i '1a %begin %{\n#include <cstdint>\n%}' \
            /tmp/compacttree-1.0.0/CompactTree/compact_tree.i
          python3 -m pip install /tmp/compacttree-1.0.0
      - name: Run benchmark
        run: python3 joss/benchmark.py > joss/benchmark-results.csv
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: joss/benchmark-results.csv

  deploy-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev/py310/requirements-release.txt
    - name: Build package
      run: python setup.py egg_info --tag-build=".post${{github.run_number}}" sdist bdist_wheel
    - name: Test publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository-url: https://test.pypi.org/legacy/
        verbose: true
    - name: Install from test PyPI
      run: |
        rm -rf *
        python3 -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ phyloframe
    - name: Test install
      run: |
        python3 -c "import phyloframe; print(phyloframe.__version__)"

  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_sdist
      - coverage
      - cli-smoke
      - deploy-test
      - packaging-bdist
      - packaging-sdist
      - packaging-source
      - test
      - tidy
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        python -m pip install -r requirements-dev/py310/requirements-release.txt
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        verbose: true
