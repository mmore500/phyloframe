[bumpver]
current_version = "v0.5.0"
version_pattern = "vMAJOR.MINOR.PATCH"
commit = True
tag = True

[bumpver:file_patterns]
phyloframe/__init__.py =
  __version__ = "{pep440_version}"
phyloframe/_auxlib/_get_phyloframe_version.py =
  return "{pep440_version}"
CITATION.cff =
  version: {pep440_version}
pyproject.toml =
  version = "{pep440_version}"
README.md =
  phyloframe\[jit\]=={pep440_version}
  singularity exec docker://ghcr.io/mmore500/phyloframe:v{pep440_version} python3 -m phyloframe --help

[bdist_wheel]
universal = 1

[flake8]
exclude = docs

[aliases]
test = pytest

[tool:pytest]
collect_ignore = ['setup.py']
